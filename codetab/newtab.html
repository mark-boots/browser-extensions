<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CodeTab</title>
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo" id="btn-open-tabs" title="My CodeTabs">CodeTab</span>
      <span class="header-sep">/</span>
      <input id="tab-name" class="tab-name-input" value="Untitled" spellcheck="false" />
      <span id="unsaved-dot" class="unsaved-dot hidden" title="Unsaved changes"></span>
      <button id="btn-save" class="btn-save hidden" title="Save (Ctrl+S)">Save</button>
      <button id="btn-run" class="btn-run hidden" title="Run preview (Ctrl+Enter)">▶ Run</button>
    </div>
    <div class="actions">
      <div class="layout-switcher">
        <button class="layout-btn" data-layout="top" title="Editors on top">
          <svg width="18" height="14" viewBox="0 0 18 14"><rect x="0" y="0" width="18" height="6" rx="1"/><rect x="0" y="8" width="18" height="6" rx="1" opacity="0.4"/></svg>
        </button>
        <button class="layout-btn" data-layout="left" title="Editors on left">
          <svg width="18" height="14" viewBox="0 0 18 14"><rect x="0" y="0" width="8" height="14" rx="1"/><rect x="10" y="0" width="8" height="14" rx="1" opacity="0.4"/></svg>
        </button>
        <button class="layout-btn" data-layout="right" title="Editors on right">
          <svg width="18" height="14" viewBox="0 0 18 14"><rect x="0" y="0" width="8" height="14" rx="1" opacity="0.4"/><rect x="10" y="0" width="8" height="14" rx="1"/></svg>
        </button>
        <button class="layout-btn" id="btn-full-preview" title="Open preview in new tab">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M6 2H2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M9 1h4v4M13 1 7.5 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="layout-btn" id="btn-toggle-console" title="Toggle console">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none"><rect x="0.75" y="0.75" width="16.5" height="12.5" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 5l3 2.5L3 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="9" y1="10" x2="15" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="divider"></div>
      <button id="btn-settings" title="Editor settings">⚙ Settings</button>
    </div>
  </header>

  <main>
    <div class="editors">
      <div class="editor-pane">
        <div class="pane-label">
          <span class="pane-label-left">HTML</span>
          <div class="pane-actions">
              <button class="pane-btn" id="btn-format-html">Format</button>
              <button class="pane-btn" id="btn-copy-html">Copy</button>
            </div>
        </div>
        <div id="editor-html" class="editor-container"></div>
      </div>
      <div class="editor-pane">
        <div class="pane-label">
          <span class="pane-label-left">CSS</span>
          <div class="pane-actions">
            <button class="pane-btn" id="btn-format-css">Format</button>
            <button class="pane-btn" id="btn-copy-css">Copy</button>
          </div>
        </div>
        <div id="editor-css" class="editor-container"></div>
      </div>
      <div class="editor-pane">
        <div class="pane-label">
          <span class="pane-label-left">JS</span>
          <div class="pane-actions">
            <button class="pane-btn" id="btn-format-js">Format</button>
            <button class="pane-btn" id="btn-copy-js">Copy</button>
          </div>
        </div>
        <div id="editor-js" class="editor-container"></div>
      </div>
    </div>

    <div class="preview-pane">
      <div class="pane-label">
        <span class="pane-label-left">Preview</span>
      </div>
      <iframe id="preview" src="preview.html"></iframe>
      <div id="console-panel" class="console-panel hidden">
        <div class="console-resize-handle" id="console-resize-handle"></div>
        <div class="console-toolbar">
          <span class="console-title">Console</span>
          <button id="btn-clear-console" class="console-btn">Clear</button>
        </div>
        <div id="console-entries" class="console-entries"></div>
      </div>
    </div>
  </main>

  <!-- My CodeTabs modal -->
  <div id="tabs-modal" class="modal hidden">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>My CodeTabs</h2>
        <button id="btn-new-tab" class="btn-new-codetab">+ New CodeTab</button>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div id="tabs-list" class="tabs-list"></div>
    </div>
  </div>

  <!-- Template picker modal -->
  <div id="template-modal" class="modal hidden">
    <div class="modal-overlay" id="template-overlay"></div>
    <div class="modal-content modal-content--wide">
      <div class="modal-header">
        <h2>New CodeTab</h2>
        <button class="modal-close" id="template-close">✕</button>
      </div>
      <div id="template-grid" class="template-grid"></div>
    </div>
  </div>


  <!-- Settings modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-overlay" id="settings-overlay"></div>
    <div class="modal-content modal-content--settings">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" id="settings-close">✕</button>
      </div>
      <div class="settings-columns">
        <div class="settings-col">
          <div class="settings-col-label">Default</div>
          <div class="settings-row">
            <span>Font size</span>
            <div class="font-size-control">
              <button id="btn-font-dec">−</button>
              <span id="font-size-val">13</span>
              <button id="btn-font-inc">+</button>
            </div>
          </div>
          <div class="settings-row">
            <span>Wrap lines</span>
            <input type="checkbox" id="toggle-wrap" />
          </div>
          <div class="settings-row">
            <span>Theme</span>
            <select id="theme-select" class="settings-select"></select>
          </div>
          <div class="settings-row">
            <span>Indent size</span>
            <select id="indent-select" class="settings-select">
              <option value="2">2 spaces</option>
              <option value="4">4 spaces</option>
            </select>
          </div>
          <div class="settings-row">
            <span>Emmet</span>
            <input type="checkbox" class="settings-toggle" id="toggle-emmet" />
          </div>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-col">
          <div class="settings-col-label">This CodeTab</div>
          <div class="settings-row">
            <span>Auto-run</span>
            <input type="checkbox" class="settings-toggle" id="toggle-autorun" />
          </div>
          <div class="settings-row">
            <span>Auto-save</span>
            <input type="checkbox" class="settings-toggle" id="toggle-autosave" />
          </div>
          <div class="resources-section">
            <div class="resources-section-label">CSS</div>
            <div id="resources-css-list" class="resources-list"></div>
            <div class="resources-add-row">
              <input id="resources-css-input" class="resources-input" placeholder="https://cdn.example.com/style.css" />
              <button id="btn-add-css-resource">Add</button>
            </div>
          </div>
          <div class="resources-section">
            <div class="resources-section-label">JavaScript</div>
            <div id="resources-js-list" class="resources-list"></div>
            <div class="resources-add-row">
              <input id="resources-js-input" class="resources-input" placeholder="https://cdn.example.com/script.js" />
              <button id="btn-add-js-resource">Add</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="vendor/split.js"></script>
  <script src="vendor/jszip.js"></script>
  <script src="vendor/emmet.js"></script>
  <script src="vendor/codemirror.js"></script>
  <script src="vendor/prettier.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
