<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Audio Control</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="label">Volume</div>
      <div class="value" id="display">100%</div>
      <input type="range" id="slider" min="0" max="6" step="0.05" value="1" />
      <button id="reset">Reset all</button>

      <div class="divider"></div>

      <div class="filter-row">
        <span class="filter-label">Bass</span>
        <span class="filter-value" id="bass-display">0 dB</span>
      </div>
      <input type="range" id="bass" min="-10" max="10" step="0.5" value="0" />

      <div class="filter-row">
        <span class="filter-label">Treble</span>
        <span class="filter-value" id="treble-display">0 dB</span>
      </div>
      <input type="range" id="treble" min="-10" max="10" step="0.5" value="0" />

      <div class="divider"></div>

      <label class="toggle">
        <input type="checkbox" id="mono" />
        <span>Mono</span>
      </label>

    </div>
    <script src="popup.js"></script>
  </body>
</html>
