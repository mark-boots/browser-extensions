<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="player"></div>
  <script src="https://player.twitch.tv/js/embed/v1.js"></script>
  <script>
    const p       = new URLSearchParams(location.search);
    const channel = p.get('channel') || '';
    const muted   = p.get('muted') === '1';

    const player = new Twitch.Player('player', {
      channel,
      width: '100%',
      height: '100%',
      muted,
      controls: false,
      autoplay: true,
      parent: ['mark-boots.github.io'],
    });

    function sendState() {
      window.parent.postMessage({
        type: 'tw_state',
        state: player.isPaused() ? 'paused' : 'playing',
        muted: player.getMuted(),
        volume: Math.round(player.getVolume() * 100),
      }, '*');
    }

    player.addEventListener(Twitch.Player.READY, () => {
      const qs = player.getQualities();
      window.parent.postMessage({
        type: 'tw_ready',
        qualities: qs.map(q => ({ id: q.group, label: q.name })),
        muted: player.getMuted(),
        volume: Math.round(player.getVolume() * 100),
      }, '*');
    });

    player.addEventListener(Twitch.Player.PLAYING, () =>
      window.parent.postMessage({ type: 'tw_state', state: 'playing' }, '*'));
    player.addEventListener(Twitch.Player.PAUSE, () =>
      window.parent.postMessage({ type: 'tw_state', state: 'paused' }, '*'));
    player.addEventListener(Twitch.Player.OFFLINE, () =>
      window.parent.postMessage({ type: 'tw_state', state: 'offline' }, '*'));
    player.addEventListener(Twitch.Player.ONLINE, () =>
      window.parent.postMessage({ type: 'tw_state', state: 'online' }, '*'));

    window.addEventListener('message', ({ data }) => {
      if (!data) return;
      switch (data.cmd) {
        case 'play':       player.play(); break;
        case 'pause':      player.pause(); break;
        case 'mute':       player.setMuted(true); break;
        case 'unmute':     player.setMuted(false); break;
        case 'setVolume':  player.setVolume(data.value / 100); break;
        case 'setQuality': player.setQuality(data.value); break;
        case 'seekToLive': player.seek(Infinity); break;
      }
    });
  </script>
</body>
</html>
