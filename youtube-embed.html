<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="player"></div>
  <script>
    const p     = new URLSearchParams(location.search);
    const v     = p.get('v') || '';
    const muted = p.get('muted') === '1';

    const YT_QUALITY_LABELS = {
      hd2160: '4K', hd1440: '1440p', hd1080: '1080p', hd720: '720p',
      large: '480p', medium: '360p', small: '240p', tiny: '144p', auto: 'Auto'
    };

    let player;

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('player', {
        videoId: v,
        playerVars: { autoplay: 1, mute: muted ? 1 : 0, controls: 0, modestbranding: 1, rel: 0 },
        events: {
          onReady() {
            const qs = player.getAvailableQualityLevels();
            window.parent.postMessage({
              type: 'yt_ready',
              qualities: qs.map(q => ({ id: q, label: YT_QUALITY_LABELS[q] || q })),
              muted: player.isMuted(),
              volume: player.getVolume(),
            }, '*');
          },
          onStateChange(e) {
            window.parent.postMessage({ type: 'yt_state', state: e.data }, '*');
          },
          onPlaybackQualityChange(e) {
            window.parent.postMessage({ type: 'yt_quality', quality: e.data }, '*');
          },
        },
      });
    };

    window.addEventListener('message', ({ data }) => {
      if (!player || !data) return;
      switch (data.cmd) {
        case 'play':       player.playVideo(); break;
        case 'pause':      player.pauseVideo(); break;
        case 'mute':       player.mute(); break;
        case 'unmute':     player.unMute(); break;
        case 'setVolume':  player.setVolume(data.value); break;
        case 'setQuality': player.setPlaybackQuality(data.value); break;
        case 'seekToLive': player.seekTo(player.getDuration(), true); break;
      }
    });

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  </script>
</body>
</html>
