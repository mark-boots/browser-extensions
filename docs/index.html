<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser Extensions – Mark Boots</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0e0e10;
      color: #efeff1;
      padding: 48px 24px;
      max-width: 720px;
      margin: 0 auto;
      line-height: 1.6;
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    p { color: #adadb8; margin-bottom: 32px; }
    .ext-card {
      background: #18181b;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .ext-card h2 { font-size: 18px; margin-bottom: 6px; }
    .ext-card p { color: #adadb8; font-size: 14px; margin: 0; }
    .ext-links { display: flex; gap: 10px; flex-shrink: 0; align-items: flex-start; }
    a {
      color: #9147ff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 12px;
      border: 1px solid #9147ff;
      border-radius: 4px;
    }
    a:hover { background: #9147ff; color: #fff; }
  </style>
</head>
<body>
  <h1>Browser Extensions</h1>
  <p>Extensions built by Mark Boots for Edge and Chrome.</p>

  <div class="ext-card">
    <div>
      <h2>MultiStreamView</h2>
      <p>Watch multiple YouTube, Twitch, and Kick streams simultaneously with integrated chat sidebar.</p>
    </div>
    <div class="ext-links">
      <a href="multistreamview/privacy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
